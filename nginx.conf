server {
    listen 80;
    root  /var/www/html;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root;
        
    }
    # Blocking the direct access to sensitive files 
    location ~/\.(git|env) {
        deny all;
    }

}